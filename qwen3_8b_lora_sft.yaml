### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05

### dataset
dataset: adrau_train
template: qwen
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: saves/adrau_llm/qwen3-8b/lora/sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine_with_restarts
warmup_ratio: 0.1
weight_decay: 0.01
bf16: true
ddp_timeout: 180000000

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500

### generation
temperature: 0.2
top_p: 0.9
